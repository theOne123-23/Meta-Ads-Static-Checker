services:
  - type: web
    name: meta-ads-checker
    env: python
    buildCommand: pip install --upgrade pip "setuptools>=70" wheel && pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
