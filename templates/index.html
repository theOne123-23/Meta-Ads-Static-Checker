<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meta Ads Static Checker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1c1e21;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; color: #1877f2; }
    p.subtitle { font-size: 14px; color: #65676b; margin-bottom: 32px; }

    .upload-box {
      width: 100%;
      max-width: 540px;
      background: white;
      border-radius: 12px;
      padding: 40px 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      text-align: center;
    }

    .drop-area {
      border: 2px dashed #1877f2;
      border-radius: 8px;
      padding: 40px 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .drop-area:hover, .drop-area.drag-over { background: #e7f0fd; }
    .drop-area p { font-size: 14px; color: #65676b; margin-top: 8px; }
    .drop-area .icon { font-size: 40px; }

    input[type="file"] { display: none; }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #1877f2;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #166fe5; }
    button:disabled { background: #bcc0c4; cursor: not-allowed; }

    #preview {
      margin-top: 16px;
      max-width: 100%;
      max-height: 180px;
      border-radius: 8px;
      display: none;
      object-fit: contain;
    }

    #results { width: 100%; max-width: 540px; margin-top: 24px; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 15px;
      font-weight: 700;
      color: #65676b;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 14px;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .status-pass { background: #d4edda; color: #155724; }
    .status-fail { background: #f8d7da; color: #721c24; }
    .status-warn { background: #fff3cd; color: #856404; }

    .result-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f0f2f5;
      font-size: 14px;
    }

    .result-row:last-child { border-bottom: none; }
    .result-row .label { color: #65676b; }
    .result-row .value { font-weight: 600; }

    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .tag {
      background: #e7f0fd;
      color: #1877f2;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .alert {
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .alert-warn  { background: #fff3cd; border-left: 4px solid #ffc107; }
    .alert-info  { background: #d1ecf1; border-left: 4px solid #17a2b8; }
    .alert-error { background: #f8d7da; border-left: 4px solid #dc3545; }
    .alert-ok    { background: #d4edda; border-left: 4px solid #28a745; }

    .overlay-img {
      width: 100%;
      border-radius: 8px;
      margin-top: 12px;
      border: 1px solid #e4e6eb;
    }

    .legend {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      font-size: 12px;
      color: #65676b;
    }

    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 2px;
      display: inline-block;
      margin-right: 4px;
      vertical-align: middle;
    }

    #loading { display: none; color: #65676b; font-size: 14px; margin-top: 12px; }
  </style>
</head>
<body>

  <h1>Meta Ads Static Checker</h1>
  <p class="subtitle">Size validation &amp; safe zone analysis for Facebook &amp; Instagram ads</p>

  <div class="upload-box">
    <div class="drop-area" id="dropArea">
      <div class="icon">🖼️</div>
      <p><strong>Click to upload</strong> or drag &amp; drop your ad image</p>
      <p>PNG, JPG, GIF, WEBP &mdash; max 30MB</p>
    </div>
    <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.gif,.webp" />
    <img id="preview" alt="Preview" />
    <p id="loading">⏳ Checking your ad...</p>
    <button id="checkBtn" disabled>Check Ad</button>
  </div>

  <div id="results"></div>

  <script>
    const dropArea  = document.getElementById('dropArea');
    const fileInput = document.getElementById('fileInput');
    const preview   = document.getElementById('preview');
    const checkBtn  = document.getElementById('checkBtn');
    const loading   = document.getElementById('loading');
    const results   = document.getElementById('results');
    let selectedFile = null;

    dropArea.addEventListener('click', () => fileInput.click());
    dropArea.addEventListener('dragover', (e) => { e.preventDefault(); dropArea.classList.add('drag-over'); });
    dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
    dropArea.addEventListener('drop', (e) => {
      e.preventDefault();
      dropArea.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

    function handleFile(file) {
      selectedFile = file;
      checkBtn.disabled = false;
      results.innerHTML = '';
      const reader = new FileReader();
      reader.onload = (e) => { preview.src = e.target.result; preview.style.display = 'block'; };
      reader.readAsDataURL(file);
    }

    checkBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      loading.style.display = 'block';
      checkBtn.disabled = true;
      results.innerHTML = '';

      const formData = new FormData();
      formData.append('file', selectedFile);

      try {
        const res  = await fetch('/check', { method: 'POST', body: formData });
        const data = await res.json();
        renderResults(data);
      } catch (err) {
        results.innerHTML = '<p style="color:red;margin-top:12px">Error checking the file. Please try again.</p>';
      } finally {
        loading.style.display = 'none';
        checkBtn.disabled = false;
      }
    });

    function alert_(cls, text) {
      return `<div class="alert alert-${cls}">${text}</div>`;
    }

    function renderResults(data) {
      if (data.error) {
        results.innerHTML = `<div class="card">${alert_('error', data.error)}</div>`;
        return;
      }

      /* ── Card 1: Size & Ratio ── */
      const passed = data.passed;
      const badge  = `<span class="status-badge ${passed ? 'status-pass' : 'status-fail'}">${passed ? '✓ PASSED' : '✗ FAILED'}</span>`;

      let placements = '';
      const placementInfo = (data.info || []).find(i => i.startsWith('Suitable'));
      if (placementInfo) {
        const names = placementInfo.replace('Suitable for: ', '').split(', ');
        placements = `<div class="result-row">
          <span class="label">Placements</span>
          <span class="value">
            <div class="tag-list">${names.map(n => `<span class="tag">${n}</span>`).join('')}</div>
          </span>
        </div>`;
      }

      let sizeAlerts = (data.info  || []).filter(i => !i.startsWith('Suitable') && !i.startsWith('Ratio'))
                                         .map(i => alert_('info', i)).join('');
      let sizeIssues = (data.issues|| []).map(i => alert_('error', '⚠️ ' + i)).join('');

      let card1 = `
        <div class="card">
          <h2>Size &amp; Ratio Check</h2>
          ${badge}
          <div class="result-row"><span class="label">Dimensions</span><span class="value">${data.width} × ${data.height} px</span></div>
          <div class="result-row"><span class="label">Detected Ratio</span><span class="value">${data.detected_ratio || 'Unknown'}</span></div>
          <div class="result-row"><span class="label">Format</span><span class="value">${data.format || 'N/A'}</span></div>
          ${placements}
          <div style="margin-top:12px">${sizeAlerts}${sizeIssues}</div>
        </div>`;

      /* ── Card 2: Safe Zone ── */
      let card2 = '';
      const sz = data.safe_zone_check;
      if (sz) {
        const hasWarnings = sz.warnings && sz.warnings.length > 0;
        const szBadge = hasWarnings
          ? `<span class="status-badge status-warn">⚠ REVIEW SAFE ZONE</span>`
          : `<span class="status-badge status-pass">✓ SAFE ZONE OK</span>`;

        const margins = sz.danger_zone_margins;
        const safe    = sz.safe_zone;

        let szWarnings = (sz.warnings || []).map(w => alert_('warn', '⚠️ ' + w)).join('');
        let szNotes    = (sz.notes    || []).map(n => alert_('info', 'ℹ️ ' + n)).join('');

        const overlayImg = sz.overlay_image
          ? `<img class="overlay-img" src="data:image/png;base64,${sz.overlay_image}" alt="Safe zone overlay" />
             <div class="legend">
               <span><span class="legend-dot" style="background:rgba(220,38,38,0.45)"></span>Danger zone</span>
               <span><span class="legend-dot" style="background:#22c55e"></span>Safe zone border</span>
             </div>`
          : '';

        card2 = `
          <div class="card">
            <h2>Safe Zone Check</h2>
            ${szBadge}
            <div class="result-row"><span class="label">Safe area size</span><span class="value">${safe.width_px} × ${safe.height_px} px</span></div>
            <div class="result-row"><span class="label">Top danger zone</span><span class="value">${margins.top} of height</span></div>
            <div class="result-row"><span class="label">Bottom danger zone</span><span class="value">${margins.bottom} of height</span></div>
            <div class="result-row"><span class="label">Left / Right</span><span class="value">${margins.left} each side</span></div>
            <div style="margin-top:12px">${szWarnings}${szNotes}</div>
            ${overlayImg}
          </div>`;
      }

      results.innerHTML = card1 + card2;
    }
  </script>

</body>
</html>
